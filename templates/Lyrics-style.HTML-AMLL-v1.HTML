<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动态歌词展示</title>
    <style>
        :root {
            --rcolor: 1;
            --color: 0.25;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #121212;
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            cursor: pointer;
            position: relative; /* 为背景容器提供定位上下文 */
        }

        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .background-container img,
        .background-container video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 等比缩放填充，无裁切 */
            opacity: 0.2; /* 20% 不透明度 */
            display: block;
        }

        .background-container canvas {
            width: 100%;
            height: 100%;
            display: block;
            opacity: 0.45;
        }

        #background-brightness-overlay {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: rgba(0, 0, 0, 0);
            transition: background-color 0.2s ease, opacity 0.2s ease;
        }

        .player-container {
            width: 90%;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        :where(#albumSidePanel, #amll-stub-host, body) .song-info-container {
            box-sizing: border-box;
            width: min(100%, 520px);
            max-width: min(100%, 520px);
            margin: 0 auto;
        }

        :where(#albumSidePanel, #amll-stub-host, body) #albumCoverContainer {
            width: min(320px, 60vw);
            max-width: min(320px, 60vw);
        }

        :where(#albumSidePanel, #amll-stub-host, body) #albumInfo {
            width: 100% !important;
            max-width: 100% !important;
        }

        :where(#albumSidePanel, #amll-stub-host, body) #songTitle,
        :where(#albumSidePanel, #amll-stub-host, body) #songArtist {
            display: block;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .player-container.paused-mode {
            height: 100%;
            overflow: auto;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE 10+ */
        }

        .player-container.paused-mode::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        /* 隐藏音频控件 */
        audio {
            display: none;
        }

        .lyrics-container {
            min-height: 15em; /* 使用 min-height 保证初始高度 */
            overflow: hidden; /* 隐藏动画中可能溢出的部分 */
            position: relative; /* 为绝对定位的子元素提供基准 */
            display: -webkit-flex;
            display: flex;
            -webkit-flex-direction: column;
            flex-direction: column;
            -webkit-justify-content: center;
            justify-content: center;
            -webkit-align-items: center;
            align-items: center;
        }

        .lyric-line {
            position: relative;
            font-size: calc(4.5em * var(--lyric-scale, 1));
            font-weight: bold;
            line-height: 1.5;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            color: rgba(255, 255, 255, 0.2); /* 白色 20% 不透明 */
            width: 100%;
            word-break: keep-all;
            white-space: normal;
        }

        /* 模糊层容器 */
        .blur-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: inherit;
            align-items: inherit;
            z-index: -1;
            pointer-events: none;
        }

        /* 模糊文本 */
        .blur-text {
            color: white;
            opacity: 0.1;
            filter: blur(8px);
            font-size: inherit;
            font-weight: inherit;
            line-height: inherit;
        }

        .lyric-line.left-aligned {
            justify-content: flex-start;
        }

        .lyric-line.center-aligned {
            justify-content: center;
        }

        .lyric-line.right-aligned {
            justify-content: flex-end;
        }

        .lyric-line.small-font {
            font-size: calc(2.25em * var(--lyric-scale, 1)); /* 继承缩放比，保持背景歌词更小 */
        }

        .syllable {
            position: relative;
            display: inline-block;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.4); /* 柔和发光效果 */
            filter: blur(0);
            -webkit-filter: blur(0);
            background-repeat: no-repeat;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
            flex-shrink: 0;
            white-space: nowrap;
            transform: translateY(0); /* 为逐音节上浮动画设定基线 */
            will-change: transform, background-position;
        }

        .syllable.non-latin,
        .blur-text.non-latin {
            white-space: normal;
            word-break: break-word;
            overflow-wrap: anywhere;
        }

        .syllable.non-latin {
            flex-shrink: 1;
        }

        .word-wrapper {
            display: inline-flex;
            flex: 0 0 auto;
            flex-wrap: nowrap;
        }

        .word-space {
            display: inline-flex;
            flex: 0 0 auto;
            white-space: pre;
        }

        .lyric-line.active {
            /*background: rgba(255,255,255,0.08);  可选：高亮当前行 */
            border-radius: 0.2em;
        }
        /* 新增：翻译行对齐样式 */
        .translation-line.left-aligned {
            text-align: left;
        }
        .translation-line.center-aligned {
            text-align: center;
        }
        .translation-line.right-aligned {
            text-align: right;
        }

        .font-slider-container {
            display: none; /* 默认隐藏 */
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }
        
        /* 仅在手机等小屏幕设备上显示滑块 */
        @media screen and (max-width: 768px), screen and (orientation: portrait) {
            .font-slider-container {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div id="background-brightness-overlay" aria-hidden="true"></div>
    <div class="player-container" id="player-container">
        <audio id="audio-player"></audio>
        <div id="lyrics-container"></div>
    </div>
    <div class="font-slider-container">
        <input type="range" min="0.5" max="1.5" value="1" step="0.05" id="fontSlider">
    </div>

    <script>
        const AMLL_SETTINGS_STORAGE_KEY = 'amll_background_settings';
        const AMLL_BACKGROUND_BRIGHTNESS_KEY = 'backgroundBrightness';
        const DEFAULT_AMLL_BACKGROUND_BRIGHTNESS = 1;
        const MIN_AMLL_BACKGROUND_BRIGHTNESS = 0.4;
        const MAX_AMLL_BACKGROUND_BRIGHTNESS = 1.6;
        const DEFAULT_AMLL_BEAT_ENABLED = true;
        const AMLL_STATE_URL = '/amll/state';
        const AMLL_STREAM_URL = '/amll/stream';
        const PROGRESS_RESYNC_INTERVAL_MS = 3000;
        const LAST_SONG_STORAGE_KEY = 'amll_last_song_meta';
        const LYRICS_REFETCH_INTERVAL_MS = 1200;
        const LYRICS_REFETCH_MAX_ATTEMPTS = 4;
        const BLOCKED_AMLL_MEDIA_KEYS = new Set([
            'musicUrl',
            'musicUrlInput',
            'lyricUrl',
            'lyricUrlInput',
            'autoPlay',
            'songTitle',
            'songArtist',
            'songTitleInput',
            'songArtistInput'
        ]);

        function normalizeAmllBackgroundBrightness(value) {
            const parsed = Number.parseFloat(value);
            if (!Number.isFinite(parsed)) return DEFAULT_AMLL_BACKGROUND_BRIGHTNESS;
            const clamped = Math.min(MAX_AMLL_BACKGROUND_BRIGHTNESS, Math.max(MIN_AMLL_BACKGROUND_BRIGHTNESS, parsed));
            return Math.round(clamped * 100) / 100;
        }

        function readCachedAmllSettings() {
            try {
                const raw = window.localStorage.getItem(AMLL_SETTINGS_STORAGE_KEY);
                if (!raw) return null;
                const parsed = JSON.parse(raw);
                return parsed && typeof parsed === 'object' ? parsed : null;
            } catch (error) {
                return null;
            }
        }

        function readCachedAmllBackgroundBrightness() {
            const settings = readCachedAmllSettings();
            return normalizeAmllBackgroundBrightness(settings?.[AMLL_BACKGROUND_BRIGHTNESS_KEY]);
        }

        function guardAmllSettingsStorage() {
            try {
                const storage = window.localStorage;
                if (!storage) {
                    return { restore: () => { }, persist: () => false };
                }

                const originalObject = {
                    getItem: storage.getItem,
                    setItem: storage.setItem,
                    removeItem: storage.removeItem,
                    clear: storage.clear
                };

                const sanitizeAmllSettings = (value) => {
                    try {
                        const parsed = typeof value === 'string' ? JSON.parse(value) : value;
                        if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) {
                            return null;
                        }
                        const cloned = { ...parsed };
                        BLOCKED_AMLL_MEDIA_KEYS.forEach((key) => {
                            if (Object.prototype.hasOwnProperty.call(cloned, key)) {
                                delete cloned[key];
                            }
                        });
                        return JSON.stringify(cloned);
                    } catch (err) {
                        return null;
                    }
                };

                let mirror = originalObject.getItem
                    ? sanitizeAmllSettings(originalObject.getItem.call(storage, AMLL_SETTINGS_STORAGE_KEY))
                    : null;

                const normalizeKey = (key) => (typeof key === 'string' ? key : String(key));

                const guardedGet = function (key) {
                    if (normalizeKey(key) === AMLL_SETTINGS_STORAGE_KEY) {
                        return mirror;
                    }
                    return originalObject.getItem
                        ? originalObject.getItem.call(this, key)
                        : null;
                };

                const guardedSet = function (key, value) {
                    if (normalizeKey(key) === AMLL_SETTINGS_STORAGE_KEY) {
                        mirror = sanitizeAmllSettings(value);
                        return undefined;
                    }
                    return originalObject.setItem
                        ? originalObject.setItem.call(this, key, value)
                        : undefined;
                };

                const guardedRemove = function (key) {
                    if (normalizeKey(key) === AMLL_SETTINGS_STORAGE_KEY) {
                        mirror = null;
                        return undefined;
                    }
                    return originalObject.removeItem
                        ? originalObject.removeItem.call(this, key)
                        : undefined;
                };

                const guardedClear = function () {
                    if (originalObject.clear) {
                        originalObject.clear.call(this);
                    }
                    if (mirror !== null && mirror !== undefined && originalObject.setItem) {
                        try {
                            originalObject.setItem.call(this, AMLL_SETTINGS_STORAGE_KEY, mirror);
                        } catch (error) {
                            console.warn('[AMLL] 恢复 AMLL 缓存失败', error);
                        }
                    }
                };

                storage.getItem = guardedGet;
                storage.setItem = guardedSet;
                storage.removeItem = guardedRemove;
                storage.clear = guardedClear;

                const restore = () => {
                    storage.getItem = originalObject.getItem;
                    storage.setItem = originalObject.setItem;
                    storage.removeItem = originalObject.removeItem;
                    storage.clear = originalObject.clear;
                };

                const persistSanitizedSettings = (value) => {
                    const sanitized = sanitizeAmllSettings(value);
                    if (!sanitized || !originalObject.setItem) {
                        return false;
                    }
                    try {
                        originalObject.setItem.call(storage, AMLL_SETTINGS_STORAGE_KEY, sanitized);
                        mirror = sanitized;
                        return true;
                    } catch (error) {
                        console.warn('[AMLL] 持久化 AMLL 设置失败', error);
                        return false;
                    }
                };

                return { restore, persist: persistSanitizedSettings };
            } catch (error) {
                console.warn('[AMLL] 设置缓存保护失败', error);
                return { restore: () => { }, persist: () => false };
            }
        }

        if (!window.__AMLL_DEFAULT_ALBUM__) {
            window.__AMLL_DEFAULT_ALBUM__ = "{{ url_for('static', filename='icons/icon-512x512.png') }}";
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const { restore: restoreAmllStorage, persist: persistAmllSettings } = guardAmllSettingsStorage();
            window.addEventListener('beforeunload', () => {
                try {
                    restoreAmllStorage();
                } catch (error) {
                    console.warn('[AMLL] 恢复 Storage 失败', error);
                }
                clearBeatAutoSequenceTimers();
                if (progressResyncTimer) {
                    clearInterval(progressResyncTimer);
                }
                if (streamSource) {
                    try {
                        streamSource.close();
                    } catch (error) { /* 忽略 */ }
                }
            }, { once: true });

            // 创建右键菜单用于控制律动背景
            const contextMenu = document.createElement('div');
            contextMenu.className = 'context-menu';
            contextMenu.style.cssText = `
                position: fixed;
                z-index: 9999;
                min-width: 180px;
                padding: 6px;
                background: rgba(20, 20, 20, 0.92);
                border: 1px solid rgba(255, 255, 255, 0.12);
                border-radius: 10px;
                box-shadow: 0 18px 30px rgba(0, 0, 0, 0.35);
                color: #fff;
                display: none;
            `;

            const beatToggleButton = document.createElement('button');
            beatToggleButton.style.cssText = `
                width: 100%;
                background: transparent;
                border: none;
                color: inherit;
                text-align: left;
                padding: 8px 10px;
                border-radius: 6px;
                cursor: pointer;
                font-size: 14px;
            `;
            beatToggleButton.addEventListener('mouseenter', () => {
                beatToggleButton.style.background = 'rgba(255, 255, 255, 0.08)';
            });
            beatToggleButton.addEventListener('mouseleave', () => {
                beatToggleButton.style.background = 'transparent';
            });

            contextMenu.appendChild(beatToggleButton);
            document.body.appendChild(contextMenu);

            function updateContextMenuLabel() {
                beatToggleButton.textContent = amllBeatEnabled
                    ? '关闭律动背景'
                    : '开启律动背景';
            }

            function hideContextMenu() {
                contextMenu.style.display = 'none';
            }

            function showContextMenu(x, y) {
                updateContextMenuLabel();
                contextMenu.style.display = 'block';
                const rect = contextMenu.getBoundingClientRect();
                const maxX = window.innerWidth - rect.width - 8;
                const maxY = window.innerHeight - rect.height - 8;
                const clampedX = Math.max(8, Math.min(x, maxX));
                const clampedY = Math.max(8, Math.min(y, maxY));
                contextMenu.style.left = `${clampedX}px`;
                contextMenu.style.top = `${clampedY}px`;
            }

            // 右键菜单事件
            document.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                showContextMenu(e.clientX, e.clientY);
            });

            document.addEventListener('click', (e) => {
                if (!contextMenu.contains(e.target)) {
                    hideContextMenu();
                }
            });

            window.addEventListener('blur', () => {
                hideContextMenu();
            });

            beatToggleButton.addEventListener('click', () => {
                applyAmllBeatTargetState(!amllBeatEnabled, 'context-menu');
                hideContextMenu();
            });

            window.setAmllBeatEnabled = (enabled) => {
                applyAmllBeatTargetState(Boolean(enabled), 'external-call');
            };

            const backgroundBrightnessOverlay = document.getElementById('background-brightness-overlay');

            function applyBackgroundBrightnessOverlay(value) {
                const normalized = normalizeAmllBackgroundBrightness(value);
                if (!backgroundBrightnessOverlay) {
                    return normalized;
                }

                if (normalized === DEFAULT_AMLL_BACKGROUND_BRIGHTNESS) {
                    backgroundBrightnessOverlay.style.backgroundColor = 'rgba(0, 0, 0, 0)';
                    backgroundBrightnessOverlay.style.opacity = '0';
                    return normalized;
                }

                backgroundBrightnessOverlay.style.opacity = '1';
                if (normalized < DEFAULT_AMLL_BACKGROUND_BRIGHTNESS) {
                    const darkness = Math.min(0.7, (DEFAULT_AMLL_BACKGROUND_BRIGHTNESS - normalized) / 0.8);
                    backgroundBrightnessOverlay.style.backgroundColor = `rgba(0, 0, 0, ${darkness.toFixed(3)})`;
                    return normalized;
                }

                const lightness = Math.min(0.32, (normalized - DEFAULT_AMLL_BACKGROUND_BRIGHTNESS) / 2);
                backgroundBrightnessOverlay.style.backgroundColor = `rgba(255, 255, 255, ${lightness.toFixed(3)})`;
                return normalized;
            }

            window.setAmllBackgroundBrightness = (value) => {
                return applyBackgroundBrightnessOverlay(value);
            };

            window.setAmllBackgroundBrightness(readCachedAmllBackgroundBrightness());

            window.addEventListener('message', (event) => {
                const data = event && event.data;
                if (!data || !data.type) return;
                if (data.type === 'amll-beat-toggle') {
                    applyAmllBeatTargetState(data.enabled, 'postMessage');
                }
                if (data.type === 'amll-background-brightness') {
                    window.setAmllBackgroundBrightness(data.value);
                }
                if (data.type === 'amll-ensure-beat-signal') {
                    ensureAmllBeatSignalReady();
                }
            });

            const audioPlayer = document.getElementById('audio-player');
            const lyricsContainer = document.getElementById('lyrics-container');
            const playerContainer = document.getElementById('player-container');
            const fontSlider = document.getElementById('fontSlider');
            let lyricsData = [];
            let forceCenterAlign = false; // 新增
            let translationData = [];
            let backgroundCleanup = null;
            let currentSong = {};
            let currentSongInfo = null;
            const playbackClock = { baseMs: 0, lastUpdateAt: performance.now(), smoothing: null, synced: false, rawBaseMs: 0, rawUpdateAt: performance.now() };
            const lineClock = { progressMs: 0, updatedAt: performance.now() };
            let lyricsRefetchTimer = null;
            let lyricsRefetchAttempts = 0;
            let latestProgressSample = null;
            let progressResyncTimer = null;
            let streamSource = null;
            let beatCurvePollTimer = null;
            let beatCurveRequestInFlight = false;
            let beatGuardTimer = null;
            let beatReplayTimers = [];
            let beatAutoSequenceTimers = [];
            let beatRepairInFlight = false;

            const AMLL_MODULE_URL = "{{ (amll_entry.js if amll_entry else '') or url_for('static', filename='assets/amll-player.js') }}";
            const amllStubState = { patched: false, restore: null, host: null, skeleton: null };
            const amllBackgroundState = { promise: null, host: null, element: null };
            const urlParams = new URLSearchParams(window.location.search);
            const queryBackground = urlParams.get('background') || null;
            const queryCover = urlParams.get('cover') || null;
            const queryFile = urlParams.get('file') || null;
            const AMLL_SKELETON_IDS = new Set([
                'player',
                'lyricsPanel',
                'albumSidePanel',
                'songTitle',
                'songArtist',
                'albumInfo',
                'albumCoverContainer',
                'albumCoverLarge',
                'progressBar',
                'progressFill',
                'waveformCanvas'
            ]);

            function clamp(value, min, max) {
                return Math.min(Math.max(value, min), max);
            }

            function lerp(a, b, t) {
                return a + (b - a) * t;
            }

            const LYRIC_SCALE_MIN = 0.01;
            const LYRIC_SCALE_DURATION_MS = 360;
            const AUTO_SCALE_SAFETY_RATIO = 0.97;
            const AUTO_SCALE_SAFETY_PADDING = 48;
            const AUTO_SCALE_EPS = 0.01;
            let userLyricScale = parseFloat(fontSlider?.value || '1') || 1;
            let appliedLyricScale = userLyricScale;
            let autoScaleRaf = null;
            let lyricScaleResyncTimer = null;
            const lineMetricCache = { metrics: null };

            function refreshDisplayedLineAnimations() {
                requestAnimationFrame(() => {
                    displayedLines.forEach((lineInfo, index) => {
                        const lineData = lyricsData[index];
                        if (lineInfo?.element && lineData) {
                            prepareSyllableAnimations(index, lineInfo.element, lineInfo, lineData);
                        }
                    });
                });
            }

            function requestLyricAnimationResync() {
                refreshDisplayedLineAnimations();
                if (lyricScaleResyncTimer) {
                    clearTimeout(lyricScaleResyncTimer);
                }
                lyricScaleResyncTimer = setTimeout(() => {
                    lyricScaleResyncTimer = null;
                    refreshDisplayedLineAnimations();
                }, LYRIC_SCALE_DURATION_MS + 80);
            }

            function setLyricScale(scale) {
                const upperBound = userLyricScale;
                const clamped = clamp(scale, LYRIC_SCALE_MIN, upperBound);
                appliedLyricScale = clamped;
                if (playerContainer) {
                    playerContainer.style.setProperty('--lyric-scale', clamped);
                }
                requestLyricAnimationResync();
                console.log('[auto-scale] apply', {
                    inputScale: scale,
                    clampedScale: clamped,
                    userScale: userLyricScale,
                    minScale: LYRIC_SCALE_MIN
                });
            }

            function measureLineMetrics() {
                const cached = lineMetricCache.metrics;
                if (cached) return cached;

                const host = document.createElement('div');
                host.style.position = 'absolute';
                host.style.left = '-9999px';
                host.style.top = '0';
                host.style.width = '1000px';
                host.style.pointerEvents = 'none';
                host.style.visibility = 'hidden';
                host.style.setProperty('--lyric-scale', '1');
                document.body.appendChild(host);

                const buildLine = (isSmall, withTranslation) => {
                    const line = document.createElement('div');
                    line.className = 'lyric-line center-aligned';
                    if (isSmall) line.classList.add('small-font');
                    const word = document.createElement('span');
                    word.className = 'word-wrapper';
                    const syllable = document.createElement('span');
                    syllable.className = 'syllable';
                    syllable.textContent = 'Sample words here';
                    word.appendChild(syllable);
                    line.appendChild(word);
                    if (withTranslation) {
                        const trans = document.createElement('div');
                        trans.className = 'translation-line center-aligned';
                        trans.style.fontSize = isSmall ? '0.8em' : '0.5em';
                        trans.style.color = '#ffffff';
                        trans.style.fontWeight = 'normal';
                        trans.style.lineHeight = '1.2';
                        trans.style.marginTop = '0.1em';
                        trans.style.width = '100%';
                        trans.style.paddingBottom = '0.2em';
                        trans.textContent = 'translation';
                        line.appendChild(trans);
                    }
                    return line;
                };

                const lines = [
                    { key: 'normal', el: buildLine(false, false) },
                    { key: 'small', el: buildLine(true, false) },
                    { key: 'normalTrans', el: buildLine(false, true) },
                    { key: 'smallTrans', el: buildLine(true, true) }
                ];

                lines.forEach(({ el }) => host.appendChild(el));

                const metrics = {};
                lines.forEach(({ key, el }) => {
                    metrics[key] = el.offsetHeight || el.getBoundingClientRect().height || 0;
                });

                host.remove();
                lineMetricCache.metrics = metrics;
                return metrics;
            }

            function computeAutoScaleTarget() {
                const viewportHeight = window.innerHeight
                    || document.documentElement.clientHeight
                    || (playerContainer ? playerContainer.clientHeight : 0)
                    || 0;
                if (!viewportHeight) {
                    console.log('[auto-scale] viewport height unavailable');
                    return clamp(userLyricScale, LYRIC_SCALE_MIN, userLyricScale);
                }
                const availableHeight = Math.max(1, viewportHeight - AUTO_SCALE_SAFETY_PADDING);

                const metrics = measureLineMetrics();
                const lines = Array.from(lyricsContainer?.querySelectorAll('.lyric-line') || []);
                if (lines.length === 0) {
                    console.log('[auto-scale] no visible lines yet');
                    return clamp(userLyricScale, LYRIC_SCALE_MIN, userLyricScale);
                }

                let normal = 0;
                let small = 0;
                let normalTrans = 0;
                let smallTrans = 0;
                lines.forEach((line) => {
                    const isSmall = line.classList.contains('small-font');
                    const hasTrans = !!line.querySelector('.translation-line');
                    if (isSmall) {
                        if (hasTrans) {
                            smallTrans += 1;
                        } else {
                            small += 1;
                        }
                    } else {
                        if (hasTrans) {
                            normalTrans += 1;
                        } else {
                            normal += 1;
                        }
                    }
                });

                const baseSum =
                    normal * (metrics.normal || 0) +
                    small * (metrics.small || 0) +
                    normalTrans * (metrics.normalTrans || 0) +
                    smallTrans * (metrics.smallTrans || 0);

                if (baseSum <= 0) {
                    console.log('[auto-scale] baseSum is zero', { baseSum });
                    return clamp(userLyricScale, LYRIC_SCALE_MIN, userLyricScale);
                }

                const baselineTotal = baseSum * userLyricScale;
                const ratio = availableHeight / baselineTotal;
                const adjustedRatio = ratio * AUTO_SCALE_SAFETY_RATIO;
                const target = clamp(
                    userLyricScale * adjustedRatio,
                    LYRIC_SCALE_MIN,
                    userLyricScale
                );
                console.log('[auto-scale] compute', {
                    viewportHeight,
                    availableHeight,
                    baseSum,
                    userScale: userLyricScale,
                    baselineTotal,
                    ratio,
                    adjustedRatio,
                    target
                });
                if (Math.abs(target - appliedLyricScale) < AUTO_SCALE_EPS) {
                    return appliedLyricScale;
                }
                return target;
            }

            function scheduleAutoScale() {
                if (autoScaleRaf) return;
                autoScaleRaf = requestAnimationFrame(() => {
                    autoScaleRaf = null;
                    const targetScale = computeAutoScaleTarget();
                    if (Math.abs(targetScale - appliedLyricScale) > AUTO_SCALE_EPS) {
                        setLyricScale(targetScale);
                    }
                });
            }

            function easeOutCubic(t) {
                return 1 - Math.pow(1 - t, 3);
            }

            function getCurrentPlaybackMs() {
                const now = performance.now();
                const elapsed = now - playbackClock.lastUpdateAt;
                let current = playbackClock.baseMs + elapsed;
                const smoothing = playbackClock.smoothing;
                if (smoothing) {
                    const progress = clamp((now - smoothing.start) / smoothing.duration, 0, 1);
                    const offset = smoothing.delta * easeOutCubic(progress);
                    current += offset;
                    if (progress >= 1) {
                        playbackClock.baseMs = current;
                        playbackClock.lastUpdateAt = now;
                        playbackClock.smoothing = null;
                    }
                }
                return Math.max(0, current);
            }

            function getCurrentPlaybackSeconds() {
                return getCurrentPlaybackMs() / 1000;
            }

            function getLinePlaybackMs() {
                const now = performance.now();
                return Math.max(0, lineClock.progressMs + (now - lineClock.updatedAt));
            }

            function getLinePlaybackSeconds() {
                return getLinePlaybackMs() / 1000;
            }

            function syncPlaybackProgress(progressMs, { immediate = false } = {}) {
                if (!Number.isFinite(progressMs)) return;
                const now = performance.now();
                const current = getCurrentPlaybackMs();
                const delta = progressMs - current;
                playbackClock.baseMs = immediate ? progressMs : current;
                playbackClock.lastUpdateAt = now;
                playbackClock.rawBaseMs = progressMs;
                playbackClock.rawUpdateAt = now;
                lineClock.progressMs = progressMs;
                lineClock.updatedAt = now;
                playbackClock.synced = true;
                playbackClock.smoothing = null;
                if (!immediate && Math.abs(delta) > 10) {
                    const duration = clamp(Math.abs(delta) * 1.2, 180, 900);
                    playbackClock.smoothing = { start: now, duration, delta };
                }
                latestProgressSample = { progressMs, receivedAt: now };
            }

            function startProgressResync() {
                if (progressResyncTimer) return;
                progressResyncTimer = setInterval(() => {
                    if (!latestProgressSample) return;
                    const now = performance.now();
                    const projected = latestProgressSample.progressMs + (now - latestProgressSample.receivedAt);
                    playbackClock.rawBaseMs = projected;
                    playbackClock.rawUpdateAt = now;
                    syncPlaybackProgress(projected, { immediate: true });
                }, PROGRESS_RESYNC_INTERVAL_MS);
            }

            function ensureMediaCapabilitiesCompat() {
                const mediaCapabilities = navigator.mediaCapabilities;
                if (!mediaCapabilities) {
                    return;
                }
                const originalEncodingInfo = mediaCapabilities.encodingInfo;
                if (typeof originalEncodingInfo !== 'function' || originalEncodingInfo.__amllPatched) {
                    return;
                }
                const wrapped = async (...args) => {
                    try {
                        return await originalEncodingInfo.apply(mediaCapabilities, args);
                    } catch (error) {
                        const message = String(error || '');
                        const isEnumError = error instanceof TypeError && message.includes('encodingInfo');
                        if (!isEnumError) {
                            console.warn('[AMLL] MediaCapabilities encodingInfo fallback applied', error);
                        }
                        return { supported: false, smooth: false, powerEfficient: false };
                    }
                };
                Object.defineProperty(wrapped, '__amllPatched', {
                    value: true,
                    writable: false
                });
                try {
                    Object.defineProperty(mediaCapabilities, 'encodingInfo', {
                        configurable: true,
                        enumerable: true,
                        value: wrapped
                    });
                } catch (error) {
                    try {
                        mediaCapabilities.encodingInfo = wrapped;
                    } catch (assignError) {
                        console.warn('[AMLL] Unable to patch MediaCapabilities.encodingInfo', assignError);
                    }
                }
            }

            function waitFor(predicate, timeout = 8000, interval = 50) {
                return new Promise((resolve, reject) => {
                    const start = Date.now();
                    const step = () => {
                        let value = null;
                        try {
                            value = predicate();
                        } catch (error) {
                            // 忽略 predicate 内部异常
                        }
                        if (value) {
                            resolve(value);
                            return;
                        }
                        if (Date.now() - start >= timeout) {
                            reject(new Error('waitFor timeout'));
                            return;
                        }
                        setTimeout(step, interval);
                    };
                    step();
                });
            }

            function resolveMediaUrl(rawPath) {
                if (!rawPath || typeof rawPath !== 'string') {
                    return null;
                }
                const trimmed = rawPath.trim();
                if (!trimmed) {
                    return null;
                }
                const normalized = trimmed.replace(/^\.\//, '');
                if (normalized.startsWith('data:') || normalized.startsWith('blob:')) {
                    return normalized;
                }
                if (/^https?:\/\//i.test(normalized)) {
                    try {
                        const urlObj = new URL(normalized, window.location.href);
                        const localHostPattern = /^(127\.\d+\.\d+\.\d+|localhost|0\.0\.0\.0|::1)$/i;
                        if (localHostPattern.test(urlObj.hostname)) {
                            urlObj.protocol = window.location.protocol;
                            urlObj.hostname = window.location.hostname;
                            urlObj.port = window.location.port || urlObj.port;
                        }
                        return urlObj.toString();
                    } catch (e) {
                        return normalized;
                    }
                }
                return normalized.startsWith('/') ? normalized : '/' + normalized;
            }

            async function initAmllBackgroundFromAlbum(coverPath) {
                const url = resolveMediaUrl(coverPath);
                if (!url) {
                    return false;
                }

                const background = await prepareAmllBackground();
                if (!background || !amllBackgroundState.element) {
                    return false;
                }

                const oldCleanup = backgroundCleanup;
                const oldContainers = Array.from(document.querySelectorAll('.background-container'));

                const container = document.createElement('div');
                container.className = 'background-container';
                container.appendChild(amllBackgroundState.element);
                document.body.appendChild(container);

                backgroundCleanup = () => {
                    try {
                        background.pause();
                    } catch (error) { /* 忽略 */ }
                    stopAmllPaletteLoop({ clearBackground: true });
                    if (amllBackgroundState.element.parentElement) {
                        amllBackgroundState.element.parentElement.removeChild(amllBackgroundState.element);
                    }
                    if (amllBackgroundState.host) {
                        amllBackgroundState.host.appendChild(amllBackgroundState.element);
                    }
                    container.remove();
                };
                backgroundCleanup.__kind = 'amll';

                try {
                    await background.setAlbum(url);
                    background.setStaticMode(false);
                    background.setFlowSpeed(4);
                    const dpr = window.devicePixelRatio || 1;
                    background.setRenderScale(dpr);
                    background.resume();
                    amllColorState.background = background;
                    await ensureAmllBeatSignalReady();
                    updateWindowBeatStatus();
                    applyAmllBeatTargetState(amllBeatEnabled, 'background-init');
                    triggerInitialBeatToggleSequence();

                    if (oldCleanup && oldCleanup.__kind !== 'amll') {
                        try { oldCleanup(); } catch (e) { /* 忽略 */ }
                    }
                    oldContainers.forEach((el) => { if (el !== container) el.remove(); });

                    return true;
                } catch (error) {
                    console.warn('[AMLL] AMLL 背景初始化失败，将回退其他方案', error);
                    if (backgroundCleanup) {
                        try { backgroundCleanup(); } catch (e) { /* 忽略 */ }
                        backgroundCleanup = null;
                    }
                    const fallbackContainer = oldContainers[0];
                    if (fallbackContainer) {
                        try {
                            fallbackContainer.appendChild(amllBackgroundState.element);
                            backgroundCleanup = oldCleanup || null;
                        } catch (attachError) { /* 忽略 */ }
                    } else if (amllBackgroundState.host) {
                        try { amllBackgroundState.host.appendChild(amllBackgroundState.element); } catch (attachError) { /* 忽略 */ }
                        backgroundCleanup = oldCleanup || null;
                    }
                    return false;
                }
            }

            async function loadBeatCurve(beatPath) {
                const url = resolveMediaUrl(beatPath);
                if (!url) {
                    amllColorState.beatCurve = null;
                    return false;

                try {
                    const res = await fetch(url);
                    if (!res.ok) {
                        throw new Error(`HTTP ${res.status}`);
                    }
                    const buffer = await res.arrayBuffer();
                    const curve = parseBeatCurve(buffer);
                    if (!curve) {
                        throw new Error('Invalid beat curve');
                    }
                    amllColorState.beatCurve = curve;
                    return true;
                } catch (error) {
                    console.warn('[AMLL] 加载节奏曲线失败', error);
                    amllColorState.beatCurve = null;
                    return false;

            async function loadBackground(backgroundPath) {
                const url = resolveMediaUrl(backgroundPath);
                if (!url) {
                    return false;
                }

                const oldCleanup = backgroundCleanup;
                const oldContainers = Array.from(document.querySelectorAll('.background-container'));

                return new Promise((resolve) => {
                    const container = document.createElement('div');
                    container.className = 'background-container';
                    document.body.appendChild(container);

                    const handleFailure = () => {
                        container.remove();
                        backgroundCleanup = null;
                        resolve(false);
                    };

                    const extension = (url.split('.').pop() || '').toLowerCase();
                    const isVideo = ['mp4', 'webm', 'ogg'].includes(extension);

                    if (isVideo) {
                        const video = document.createElement('video');
                        video.src = url;
                        video.muted = true;
                        video.loop = true;
                        video.autoplay = true;
                        video.playsInline = true;
                        video.addEventListener('loadeddata', () => {
                            const cleanup = () => {
                                video.pause();
                                video.removeAttribute('src');
                                video.load();
                                container.remove();
                            };
                            if (oldCleanup) {
                                try { oldCleanup(); } catch (e) { /* 忽略 */ }
                            } else {
                                oldContainers.forEach((el) => { if (el !== container) el.remove(); });
                            }
                            stopAmllPaletteLoop({ clearBackground: true });
                            backgroundCleanup = cleanup;
                            backgroundCleanup.__kind = 'media';
                            resolve(true);
                            video.play().catch(() => {});
                        }, { once: true });
                        video.addEventListener('error', handleFailure, { once: true });
                        container.appendChild(video);
                    } else {
                        const img = document.createElement('img');
                        img.src = url;
                        img.addEventListener('load', () => {
                            const cleanup = () => {
                                container.remove();
                            };
                            if (oldCleanup) {
                                try { oldCleanup(); } catch (e) { /* 忽略 */ }
                            } else {
                                oldContainers.forEach((el) => { if (el !== container) el.remove(); });
                            }
                            stopAmllPaletteLoop({ clearBackground: true });
                            backgroundCleanup = cleanup;
                            backgroundCleanup.__kind = 'media';
                            resolve(true);
                        }, { once: true });
                        img.addEventListener('error', handleFailure, { once: true });
                        container.appendChild(img);
                    }
                });
            }

            function getLineStartMs(line) {
                if (!line || typeof line !== 'object') return null;
                if (Array.isArray(line.syllables) && line.syllables.length > 0) {
                    const first = line.syllables[0];
                    const start = parseFloat(first.startTime);
                    if (Number.isFinite(start)) {
                        return start * 1000;
                    }
                }
                if (Array.isArray(line.words) && line.words.length > 0) {
                    const first = line.words[0];

                    const startMs = getLineStartMs(line);
                    if (!Number.isFinite(startMs)) return;
                    result.push({ timeMs: startMs, content });

            function hexToHsl(hex) {
                if (!hex || typeof hex !== 'string') return null;
                let normalized = hex.trim().replace('#', '');
                if (normalized.length === 3) {
                    normalized = normalized.split('').map((c) => c + c).join('');
                }
                if (normalized.length !== 6) return null;
                const r = parseInt(normalized.slice(0, 2), 16) / 255;
                const g = parseInt(normalized.slice(2, 4), 16) / 255;
                const b = parseInt(normalized.slice(4, 6), 16) / 255;
                const max = Math.max(r, g, b);
                const min = Math.min(r, g, b);
                let h = 0;
                let s = 0;
                const l = (max + min) / 2;
                const delta = max - min;
                if (delta !== 0) {
                    s = delta / (1 - Math.abs(2 * l - 1));
                    switch (max) {
                        case r:
                            h = ((g - b) / delta) % 6;
                            break;
                        case g:
                            h = (b - r) / delta + 2;
                            break;
                        default:
                            h = (r - g) / delta + 4;
                            break;
                    }
                    h *= 60;
                    if (h < 0) h += 360;
                }
                return {
                    h: Math.round(h),
                    s: Math.round(s * 100),
                    l: Math.round(l * 100)
                };
            }

            function hslToRgb(h, s, l) {
                const sat = clamp(s, 0, 100) / 100;
                const lig = clamp(l, 0, 100) / 100;
                const c = (1 - Math.abs(2 * lig - 1)) * sat;
                const x = c * (1 - Math.abs(((h / 60) % 2) - 1));
                const m = lig - c / 2;
                let r = 0;
                let g = 0;
                let b = 0;
                if (h >= 0 && h < 60) {
                    r = c;
                    g = x;
                } else if (h < 120) {
                    r = x;
                    g = c;
                } else if (h < 180) {
                    g = c;
                    b = x;
                } else if (h < 240) {
                    g = x;
                    b = c;
                } else if (h < 300) {
                    r = x;
                    b = c;
                } else {
                    r = c;
                    b = x;
                }
                return { r: r + m, g: g + m, b: b + m };
            }

            function ensureAudioAnalyser() {
                if (amllColorState.analyser) return;
                try {
                    const AudioContextRef = window.AudioContext || window.webkitAudioContext;
                    if (!AudioContextRef) return;
                    const audioContext = new AudioContextRef();
                    const source = audioContext.createMediaElementSource(audioPlayer);
                    const analyser = audioContext.createAnalyser();
                    analyser.fftSize = 2048;
                    analyser.smoothingTimeConstant = 0.85;
                    source.connect(analyser);
                    analyser.connect(audioContext.destination);
                    amllColorState.audioContext = audioContext;
                    amllColorState.analyser = analyser;
                    amllColorState.freqData = new Uint8Array(analyser.frequencyBinCount);
                } catch (error) {
                    console.warn('[Flow] 初始化频谱失败', error);
                }
            }

            function handleAudioLevels(payload) {
                if (!payload || typeof payload !== 'object') return;
                const levels = Array.isArray(payload.levels) ? payload.levels : [];
                if (!levels.length) return;
                realtimeAudioLevels = levels.map((value) => clamp(Number(value) || 0, 0, 1));
                if (!realtimeLevelsSmoothed.length) {
                    realtimeLevelsSmoothed = realtimeAudioLevels.slice();
                } else {
                    const alpha = 0.22;
                    for (let i = 0; i < realtimeAudioLevels.length; i += 1) {
                        const prev = realtimeLevelsSmoothed[i] ?? 0;
                        const next = realtimeAudioLevels[i];
                        realtimeLevelsSmoothed[i] = prev + (next - prev) * alpha;
                    }
                }
                const now = performance.now();
                realtimeLevelsUpdatedAt = now;
                realtimeLevelsDecayAt = now;
            }

            function getRealtimeLevels(targetBands) {
                if (!realtimeLevelsSmoothed.length) return null;
                const now = performance.now();
                const sinceUpdate = now - realtimeLevelsUpdatedAt;
                if (sinceUpdate > 2000) return null;
                if (sinceUpdate > 120 && now - realtimeLevelsDecayAt > 30) {
                    const decay = clamp(1 - sinceUpdate / 1200, 0, 1);
                    for (let i = 0; i < realtimeLevelsSmoothed.length; i += 1) {
                        realtimeLevelsSmoothed[i] *= decay;
                    }
                    realtimeLevelsDecayAt = now;
                }
                if (targetBands <= 0) return null;
                const src = realtimeLevelsSmoothed;
                const result = new Array(targetBands).fill(0);
                if (src.length === 1) {
                    result.fill(src[0]);
                    return result;
                }
                for (let i = 0; i < targetBands; i += 1) {
                    const pos = targetBands === 1 ? 0 : (i / Math.max(1, targetBands - 1)) * (src.length - 1);
                    const idx = Math.floor(pos);
                    const next = Math.min(src.length - 1, idx + 1);
                    const frac = pos - idx;
                    result[i] = src[idx] + (src[next] - src[idx]) * frac;
                }
                return result;
            }

            function getBandLevels() {
                const bandCount = amllColorState.basePaletteHsl.length || 1;
                const levels = new Array(bandCount).fill(0);
                const curveSample = sampleBeatCurve(bandCount);
                if (curveSample && curveSample.mode === 'levels') {
                    amllColorState.globalEnergy = curveSample.globalEnergy;
                    amllColorState.levelSource = 'curve';
                    return curveSample.levels.map((value) => clamp(Math.pow(value, AMLL_LEVEL_GAMMA) * AMLL_LEVEL_BOOST * AMLL_SENSITIVITY, 0, 1));
                }
                const realtimeLevels = getRealtimeLevels(bandCount);
                if (realtimeLevels) {
                    const sum = realtimeLevels.reduce((acc, value) => acc + value, 0);
                    amllColorState.globalEnergy = bandCount ? sum / bandCount : 0;
                    amllColorState.levelSource = 'realtime';
                    return realtimeLevels.map((value) => clamp(Math.pow(value, AMLL_LEVEL_GAMMA) * AMLL_LEVEL_BOOST * AMLL_SENSITIVITY, 0, 1));
                }
                if (!amllColorState.analyser || !amllColorState.freqData) {
                    amllColorState.levelSource = 'none';
                    return levels;
                }
                amllColorState.analyser.getByteFrequencyData(amllColorState.freqData);
                const totalBins = amllColorState.freqData.length;
                const nyquist = (amllColorState.audioContext && amllColorState.audioContext.sampleRate)
                    ? amllColorState.audioContext.sampleRate / 2
                    : 22050;
                const minFreq = 40;
                const maxFreq = 14000;
                const logMin = Math.log10(minFreq);
                const logMax = Math.log10(maxFreq);
                const binForFreq = (freq) => {
                    const clamped = clamp(freq, minFreq, maxFreq);
                    const ratio = clamped / nyquist;
                    return Math.max(0, Math.min(totalBins - 1, Math.round(ratio * (totalBins - 1))));
                };
                let sumRaw = 0;
                for (let i = 0; i < bandCount; i += 1) {
                    const t0 = bandCount === 1 ? 0 : i / bandCount;
                    const t1 = bandCount === 1 ? 1 : (i + 1) / bandCount;
                    const f0 = 10 ** (logMin + (logMax - logMin) * t0);
                    const f1 = 10 ** (logMin + (logMax - logMin) * t1);
                    const start = binForFreq(f0);
                    const end = Math.max(start + 1, binForFreq(f1));
                    let sumSq = 0;
                    let peak = 0;
                    let count = 0;
                    for (let j = start; j < end; j += 1) {
                        const v = amllColorState.freqData[j] || 0;
                        sumSq += v * v;
                        if (v > peak) peak = v;
                        count += 1;
                    }
                    const rms = Math.sqrt(sumSq / Math.max(1, count)) / 255;
                    const peakNorm = peak / 255;
                    const level = 0.7 * rms + 0.3 * peakNorm;
                    const emphasized = Math.pow(clamp(level, 0, 1), 1.15);
                    sumRaw += emphasized;
                    const stats = amllColorState.bandStats[i] || { ema: emphasized, dev: 0.05 };
                    const emaAlpha = 0.02;
                    const devAlpha = 0.05;
                    stats.ema = stats.ema + (emphasized - stats.ema) * emaAlpha;
                    const deviation = Math.abs(emphasized - stats.ema);
                    stats.dev = stats.dev + (deviation - stats.dev) * devAlpha;
                    amllColorState.bandStats[i] = stats;
                    let gain = null;
                    if (curveSample && curveSample.mode === 'gain') {
                        gain = curveSample.gains[i] ?? 1;
                    }
                    if (gain == null) {
                        gain = clamp(0.6 / (stats.dev + 0.02), 0.6, 3.0);
                    }
                    const adjusted = clamp(stats.ema + (emphasized - stats.ema) * gain, 0, 1);
                    levels[i] = adjusted;
                }
                amllColorState.globalEnergy = bandCount ? sumRaw / bandCount : 0;
                if (!Number.isFinite(amllColorState.globalEnergy)) {
                    amllColorState.globalEnergy = 0;
                }
                amllColorState.levelSource = 'analyser';
                for (let i = 0; i < levels.length; i += 1) {
                    levels[i] = clamp(Math.pow(levels[i], AMLL_LEVEL_GAMMA) * AMLL_LEVEL_BOOST * AMLL_SENSITIVITY, 0, 1);
                }
                return levels;
            }

            function buildDynamicColors() {
                const levels = getBandLevels();
                amllEnergyEma = amllEnergyEma + ((amllColorState.globalEnergy || 0) - amllEnergyEma) * AMLL_ENERGY_SMOOTHING;
                const globalEnergy = amllEnergyEma;
                const source = amllColorState.levelSource || 'none';
                const sourceBoost = source === 'realtime' ? 1.2 : source === 'analyser' ? 1.15 : 1;
                const darkenScale = source === 'realtime' ? 0.6 : source === 'curve' ? 0.75 : 1;
                const baseLift = source === 'realtime' ? globalEnergy * 10 : globalEnergy * 6;
                const darken = clamp(globalEnergy, 0, 1) * AMLL_DARKEN_MAX * darkenScale;
                return amllColorState.basePaletteHsl.map((base, index) => {
                    const level = clamp((levels[index] || 0) * sourceBoost, 0, 1);
                    const delta = AMLL_LIGHTNESS_MIN_DELTA
                        + level * (AMLL_LIGHTNESS_MAX_DELTA - AMLL_LIGHTNESS_MIN_DELTA)
                        - darken
                        + baseLift;
                    const lightness = clamp(base.l + delta, 0, 100);
                    const sat = clamp(base.origS ?? (base.baseS + 50), 0, 100);
                    const rgb = hslToRgb(base.h, sat, lightness);
                    return { r: rgb.r, g: rgb.g, b: rgb.b };
                });
            }

            function getActiveMesh(renderer) {
                if (!renderer) return null;
                const states = renderer.meshStates || renderer._meshStates;
                if (!Array.isArray(states) || states.length === 0) return null;
                return states[states.length - 1].mesh || null;
            }

            function getMeshSize(mesh) {
                const controlPoints = mesh && (mesh._controlPoints || mesh.controlPoints);
                if (!controlPoints) return null;
                const width = controlPoints.width ?? controlPoints._width;
                const height = controlPoints.height ?? controlPoints._height;
                if (!width || !height) return null;
                return { width, height };
            }

            function extractPaletteFromImageData(imageData, targetCount = 16) {
                if (!imageData || !imageData.width || !imageData.height) return [];
                const width = imageData.width;
                const height = imageData.height;
                const data = imageData.data;
                const step = Math.max(1, Math.floor(AMLL_PALETTE_PIXELATE));
                const samples = [];
                for (let y = 0; y < height; y += step) {
                    for (let x = 0; x < width; x += step) {
                        const idx = (y * width + x) * 4;
                        const alpha = data[idx + 3] ?? 255;
                        if (alpha < 16) continue;
                        samples.push({
                            r: (data[idx] || 0) / 255,
                            g: (data[idx + 1] || 0) / 255,
                            b: (data[idx + 2] || 0) / 255
                        });
                    }
                }
                if (!samples.length) return [];
                const count = Math.max(1, targetCount);
                const centers = new Array(count).fill(null).map((_, i) => {
                    const pos = count === 1 ? 0 : Math.floor((i / (count - 1)) * (samples.length - 1));
                    const pick = samples[pos] || samples[0];
                    return { r: pick.r, g: pick.g, b: pick.b };
                });
                for (let iter = 0; iter < 8; iter += 1) {
                    const sums = new Array(count).fill(null).map(() => ({ r: 0, g: 0, b: 0, n: 0 }));
                    for (const sample of samples) {
                        let best = 0;
                        let bestDist = Number.POSITIVE_INFINITY;
                        for (let i = 0; i < count; i += 1) {
                            const c = centers[i];
                            const dr = sample.r - c.r;
                            const dg = sample.g - c.g;
                            const db = sample.b - c.b;
                            const dist = dr * dr + dg * dg + db * db;
                            if (dist < bestDist) {
                                bestDist = dist;
                                best = i;
                            }
                        }
                        const sum = sums[best];
                        sum.r += sample.r;
                        sum.g += sample.g;
                        sum.b += sample.b;
                        sum.n += 1;
                    }
                    for (let i = 0; i < count; i += 1) {
                        const sum = sums[i];
                        if (sum.n > 0) {
                            centers[i] = { r: sum.r / sum.n, g: sum.g / sum.n, b: sum.b / sum.n };
                        } else {
                            const fallback = samples[(i * 97) % samples.length];
                            centers[i] = { r: fallback.r, g: fallback.g, b: fallback.b };
                        }
                    }
                }
                const palette = centers.map((rgb) => {
                    const hsl = hexToHsl(
                        `#${Math.round(rgb.r * 255).toString(16).padStart(2, '0')}${Math.round(rgb.g * 255).toString(16).padStart(2, '0')}${Math.round(rgb.b * 255).toString(16).padStart(2, '0')}`
                    );
                    if (!hsl) return null;
                    const origS = clamp(hsl.s, 0, 100);
                    return { h: hsl.h, l: hsl.l, baseS: clamp(origS - 50, 0, 100), origS };
                }).filter(Boolean);
                palette.sort((a, b) => (a.h - b.h) || (a.l - b.l));
                return palette;
            }

            function ensureBasePalette() {
                if (amllColorState.basePaletteHsl.length) return;
                const renderer = amllColorState.renderer;
                if (!renderer) return;
                const imageData = renderer.currentImageData || renderer._currentImageData;
                const palette = extractPaletteFromImageData(imageData, AMLL_PALETTE_TARGET);
                if (palette.length) {
                    amllColorState.basePaletteHsl = palette;
                }
            }

            function applyColorsToMesh(mesh, colors) {
                const size = getMeshSize(mesh);
                if (!size || !colors.length) return;
                const width = size.width;
                const height = size.height;
                if (!amllColorState.lastColors || amllColorState.lastColors.length !== colors.length) {
                    amllColorState.lastColors = colors.map((c) => ({ r: c.r, g: c.g, b: c.b }));
                }
                const blended = colors.map((target, index) => {
                    const prev = amllColorState.lastColors[index] || target;
                    const r = prev.r + (target.r - prev.r) * amllColorState.smoothing;
                    const g = prev.g + (target.g - prev.g) * amllColorState.smoothing;
                    const b = prev.b + (target.b - prev.b) * amllColorState.smoothing;
                    return { r, g, b };
                });
                amllColorState.lastColors = blended;
                const maxIndex = Math.max(1, colors.length - 1);
                const indexForPoint = (x, y) => {
                    const scale = Math.max(1, AMLL_NOISE_SCALE);
                    const nx = (x / Math.max(1, width - 1)) * scale;
                    const ny = (y / Math.max(1, height - 1)) * scale;
                    const hash = Math.sin(nx * 127.1 + ny * 311.7) * 43758.5453;
                    const frac = hash - Math.floor(hash);
                    return Math.floor(frac * (maxIndex + 1));
                };
                for (let x = 0; x < width; x += 1) {
                    for (let y = 0; y < height; y += 1) {
                        const colorIndex = indexForPoint(x, y);
                        const color = blended[colorIndex] || blended[blended.length - 1];
                        const point = mesh.getControlPoint ? mesh.getControlPoint(x, y) : null;
                        if (!point || !point.color) continue;
                        point.color[0] = color.r;
                        point.color[1] = color.g;
                        point.color[2] = color.b;
                    }
                }
                if (typeof mesh.updateMesh === 'function') {
                    mesh.updateMesh();
                }
            }

            function applyBasePaletteToMesh(mesh) {
                const size = getMeshSize(mesh);
                if (!size || !amllColorState.basePaletteHsl.length) return;
                const width = size.width;
                const height = size.height;
                const maxIndex = Math.max(1, amllColorState.basePaletteHsl.length - 1);
                const indexForPoint = (x, y) => {
                    const scale = Math.max(1, AMLL_NOISE_SCALE);
                    const nx = (x / Math.max(1, width - 1)) * scale;
                    const ny = (y / Math.max(1, height - 1)) * scale;
                    const hash = Math.sin(nx * 127.1 + ny * 311.7) * 43758.5453;
                    const frac = hash - Math.floor(hash);
                    return Math.floor(frac * (maxIndex + 1));
                };
                for (let x = 0; x < width; x += 1) {
                    for (let y = 0; y < height; y += 1) {
                        const colorIndex = indexForPoint(x, y);
                        const base = amllColorState.basePaletteHsl[colorIndex] || amllColorState.basePaletteHsl[amllColorState.basePaletteHsl.length - 1];
                        const rgb = hslToRgb(base.h, base.origS ?? (base.baseS + 50), base.l);
                        const point = mesh.getControlPoint ? mesh.getControlPoint(x, y) : null;
                        if (!point || !point.color) continue;
                        point.color[0] = rgb.r;
                        point.color[1] = rgb.g;
                        point.color[2] = rgb.b;
                    }
                }
                if (typeof mesh.updateMesh === 'function') {
                    mesh.updateMesh();
                }
            }

            function captureMeshColors(mesh) {
                const size = getMeshSize(mesh);
                if (!size) return;
                const width = size.width;
                const height = size.height;
                const colors = new Array(width * height);
                for (let x = 0; x < width; x += 1) {
                    for (let y = 0; y < height; y += 1) {
                        const point = mesh.getControlPoint ? mesh.getControlPoint(x, y) : null;
                        if (!point || !point.color) {
                            colors[y * width + x] = null;
                            continue;
                        }
                        colors[y * width + x] = [
                            point.color[0],
                            point.color[1],
                            point.color[2]
                        ];
                    }
                }
                amllColorState.originalMeshColors = colors;
                amllColorState.originalMeshSize = { width, height };
            }

            function restoreMeshColors(mesh) {
                const size = getMeshSize(mesh);
                const stored = amllColorState.originalMeshColors;
                const storedSize = amllColorState.originalMeshSize;
                if (!size || !stored || !storedSize) return false;
                if (size.width !== storedSize.width || size.height !== storedSize.height) return false;
                const width = size.width;
                const height = size.height;
                for (let x = 0; x < width; x += 1) {
                    for (let y = 0; y < height; y += 1) {
                        const point = mesh.getControlPoint ? mesh.getControlPoint(x, y) : null;
                        const color = stored[y * width + x];
                        if (!point || !point.color || !color) continue;
                        point.color[0] = color[0];
                        point.color[1] = color[1];
                        point.color[2] = color[2];
                    }
                }
                if (typeof mesh.updateMesh === 'function') {
                    mesh.updateMesh();
                }
                return true;
            }

            function tickAmllPalette() {
                if (!amllColorState.enabled) {
                    amllColorState.rafId = null;
                    return;
                }
                const renderer = amllColorState.renderer;
                const mesh = getActiveMesh(renderer);
                if (mesh) {
                    if (!amllColorState.originalMeshColors) {
                        captureMeshColors(mesh);
                    }
                    ensureBasePalette();
                    const colors = buildDynamicColors();
                    if (colors.length) {
                        applyColorsToMesh(mesh, colors);
                    }
                }
                amllColorState.rafId = requestAnimationFrame(tickAmllPalette);
            }

            function startAmllPaletteLoop() {
                if (amllColorState.rafId != null) return;
                amllColorState.rafId = requestAnimationFrame(tickAmllPalette);
            }

            function stopAmllPaletteLoop({ clearBackground = true } = {}) {
                if (amllColorState.rafId != null) {
                    cancelAnimationFrame(amllColorState.rafId);
                }
                amllColorState.rafId = null;
                amllColorState.enabled = false;
                amllColorState.lastColors = null;
                const renderer = amllColorState.renderer;
                const mesh = getActiveMesh(renderer);
                if (mesh) {
                    if (!restoreMeshColors(mesh)) {
                        applyBasePaletteToMesh(mesh);
                    }
                }
                amllColorState.renderer = null;
                amllColorState.basePaletteHsl = [];
                amllColorState.originalMeshColors = null;
                amllColorState.originalMeshSize = null;
                amllColorState.bandStats = [];
                amllColorState.globalEnergy = 0;
                if (clearBackground) {
                    amllColorState.background = null;
                }
            }

            function parseBeatCurve(buffer) {
                if (!buffer || buffer.byteLength < 12) return null;
                const view = new DataView(buffer);
                const magic = String.fromCharCode(
                    view.getUint8(0),
                    view.getUint8(1),
                    view.getUint8(2),
                    view.getUint8(3)
                );
                if (magic !== AMLL_BEAT_CURVE_MAGIC && magic !== AMLL_BEAT_CURVE_MAGIC_LEVELS) return null;
                const version = view.getUint8(4);
                if (version !== 1) return null;
                const bandCount = view.getUint8(5);
                const frameMs = view.getUint16(6, true);
                const frameCount = view.getUint32(8, true);
                if (!bandCount || !frameMs || !frameCount) return null;
                const dataOffset = 12;
                const bytesPerFrame = magic === AMLL_BEAT_CURVE_MAGIC_LEVELS
                    ? bandCount + 1
                    : bandCount;
                const expected = dataOffset + frameCount * bytesPerFrame;
                if (buffer.byteLength < expected) return null;
                const data = new Uint8Array(buffer, dataOffset, frameCount * bytesPerFrame);
                const mode = magic === AMLL_BEAT_CURVE_MAGIC_LEVELS ? 'levels' : 'gain';
                return { bandCount, frameMs, frameCount, data, mode };
            }

            function clearBeatCurvePolling() {
                if (beatCurvePollTimer) {
                    clearTimeout(beatCurvePollTimer);
                    beatCurvePollTimer = null;
                }
                beatCurveRequestInFlight = false;
            }

            async function requestBeatCurveFromServer() {
                if (!amllBeatEnabled) return;
                if (beatCurveRequestInFlight) return;
                beatCurveRequestInFlight = true;
                try {
                    const beatRequestPayload = {};
                    const jsonPath = currentSongInfo?.json_path
                        || currentSongInfo?.jsonPath
                        || currentSongInfo?.meta?.json_path
                        || currentSongInfo?.meta?.jsonPath
                        || queryFile;
                    if (jsonPath) beatRequestPayload.json_path = jsonPath;

                    const beatRes = await fetch('/amll/generate_beat_curve', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(beatRequestPayload)
                    });
                    const payload = await beatRes.json().catch(() => null);
                    if (!beatRes.ok && beatRes.status !== 202) {
                        console.warn('[AMLL] 自动生成节奏曲线失败', beatRes.status);
                        return;
                    }
                    if (payload && payload.status === 'success' && payload.curve) {
                        currentSong = currentSong || {};
                        currentSong.meta = currentSong.meta || {};
                        currentSong.meta.background_beat_curve = payload.curve;
                        currentSongInfo = currentSong;
                        await loadBeatCurve(payload.curve);
                        return;
                    }
                    if (payload && payload.status === 'pending') {
                        beatCurvePollTimer = setTimeout(requestBeatCurveFromServer, 2000);
                    }
                } catch (error) {
                    console.warn('[AMLL] 自动生成节奏曲线失败', error);
                } finally {
                    beatCurveRequestInFlight = false;
                }
            }

            function ensureBeatCurveAuto() {
                if (!amllBeatEnabled) return;
                if (amllColorState.beatCurve) return;
                const curvePath = currentSong?.meta?.background_beat_curve;
                if (curvePath) {
                    loadBeatCurve(curvePath);
                    return;
                }
                requestBeatCurveFromServer();
            }

            function persistAmllBeatEnabled(enabled) {
                try {
                    const next = readCachedAmllSettings() || {};
                    next.backgroundBeatEnabled = Boolean(enabled);
                    const persisted = typeof persistAmllSettings === 'function'
                        ? persistAmllSettings(next)
                        : false;
                    if (!persisted && window?.localStorage?.setItem) {
                        window.localStorage.setItem(AMLL_SETTINGS_STORAGE_KEY, JSON.stringify(next));
                    }
                } catch (error) {
                    console.warn('[AMLL] 持久化律动开关失败', error);
                }
            }

            function clearBeatReplayTimers() {
                beatReplayTimers.forEach((timer) => clearTimeout(timer));
                beatReplayTimers = [];
            }
